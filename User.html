<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Data</title>

    <style>
        #userCard{
            display: grid;
          grid-template-columns: repeat(3 , 1fr);
          gap: 20px;
          padding: 50px;
        }

         button {
         padding: 10px , 5px;
         margin : 5px 10px;
         cursor : pointer;
        }

          #paginationId{
         text-align:center;
         margin-bottom:20px;
        }

      .user-card{
            text-align: center;
            background-color: #f3f3f3;
            padding: 10px;
            border-radius: 8px;
            gap :20px;
            width:300px;
        }

    </style>
</head>
<body>
     <h2 style="text-align:center">Welcome to user record table</h2>

     <div id="userCard"></div>

     <div id="paginationId">
         <button id="prevId">prev</button>
         <p id="numberId"></p>
         <button id="nextId">next</button>
     </div>




</body>

<script>
    let currentNumber = 1;
    const limit = 10;


    function fetchUsers(page){
         fetch(`https://rickandmortyapi.com/api/character?page=${page}`)
         .then(res => res.json())
         .then(data =>{

            const userNumber = data.results.slice(0,10);
            const container = document.getElementById("userCard");
            container.innerHTML = "";

            userNumber.forEach(userDara => {
               container.innerHTML +=`
                 <div class="user-card">
                     <p>id : ${userDara.id}</p>
                     <p>name : ${userDara.name}</p>
                     <p>email :${userDara.email}</p>
                     <p>role : ${userDara.role}</p>
                     <p>status : ${userDara.status}</p>
                     <p>joinedAt : ${userDara.joinedAt}</p>
                 </div>`
            })

            document.getElementById("numberId").innerText = `page ${currentNumber}`
         });
    }

    document.getElementById("prevId").addEventListener("click", () => {
     if(currentNumber > 1){
         currentNumber--;
         fetchUsers(currentNumber)
     }

    })


     document.getElementById("nextId").addEventListener("click", () => {
         currentNumber++;
         fetchUsers(currentNumber)

    })


    fetchUsers(currentNumber);

</script>

</html>
